/* ============================================
   index.html 固有スタイル
   ============================================ */

/* HERO */
.hero {
  position: relative;
  overflow: hidden;
  min-height: 60vw;
  display: flex;
  align-items: flex-end;
}
.hero-bg { position: absolute; inset: 0; background: var(--bg-sub); }
.hero-bg img {
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0.4;
  filter: blur(3px);
  transform: scale(1.06);
}
.hero-gradient {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(12,12,12,0.0) 0%,
    rgba(12,12,12,0.5) 40%,
    rgba(12,12,12,0.98) 100%
  );
}
.hero-body {
  position: relative; z-index: 2;
  width: 100%;
  padding: var(--sp-40) var(--page-pad) var(--sp-32);
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: var(--sp-12);
}
.hero-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
.hero-label {
  font-size: var(--text-9);
  font-weight: var(--fw-light);
  letter-spacing: 0.25em;
  color: var(--accent);
  text-transform: uppercase;
}
.hero-date {
  font-size: var(--text-13);
  font-weight: var(--fw-light);
  color: var(--l3);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.hero-ev-title {
  font-size: var(--text-15);
  font-weight: var(--fw-light);
  color: var(--l2);
  margin-bottom: var(--sp-12);
  letter-spacing: 0.04em;
}
.hero-artists {
  font-size: var(--text-20);
  font-weight: var(--fw-medium);
  color: var(--l1);
  line-height: var(--lh-list);
  margin-bottom: var(--sp-20);
  letter-spacing: 0.02em;
}
.hero-meta {
  display: flex; gap: var(--sp-24);
  margin-bottom: var(--sp-20);
  padding-top: var(--sp-12);
  border-top: 0.5px solid var(--border);
}
.hero-meta-item { display: flex; flex-direction: column; gap: 4px; }
.hero-meta-label {
  font-size: var(--text-9);
  font-weight: var(--fw-light);
  color: var(--l4);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.hero-meta-val {
  font-size: var(--text-15);
  color: var(--l2);
  font-weight: var(--fw-regular);
}
.hero-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: var(--text-13);
  font-weight: var(--fw-light);
  color: var(--l3);
  letter-spacing: 0.08em;
  border-bottom: 0.5px solid var(--border-mid);
  padding-bottom: 2px;
}

/* PICKUP 横スクロール */
.pickup-scroll {
  display: flex; gap: 12px;
  overflow-x: auto;
  scrollbar-width: none; -ms-overflow-style: none;
  padding: 0 var(--page-pad) var(--sec-gap);
}
.pickup-scroll::-webkit-scrollbar { display: none; }

.pickup-card {
  flex-shrink: 0; width: 148px;
  display: flex; flex-direction: column; gap: 10px;
  text-decoration: none; color: inherit;
}
.pickup-flyer {
  width: 148px; aspect-ratio: 4/5;
  border-radius: 4px; overflow: hidden;
  background: var(--bg-sub);
}
.pickup-flyer img { width: 100%; height: 100%; object-fit: cover; }
.pickup-flyer-ph {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-9); color: var(--l4); letter-spacing: 0.12em;
}
.pickup-info { display: flex; flex-direction: column; gap: 4px; }
.pickup-date {
  font-size: var(--text-11); font-weight: var(--fw-light);
  color: var(--l3); letter-spacing: 0.06em;
}
.pickup-artists {
  font-size: var(--text-15); font-weight: var(--fw-medium);
  color: var(--l1); line-height: var(--lh-heading);
}
.pickup-sub {
  font-size: var(--text-13); font-weight: var(--fw-light); color: var(--l3);
}

/* SCHEDULE */
.ev-list { padding: 0 var(--page-pad); }
.ev-row {
  display: flex; align-items: stretch;
  border-bottom: 0.5px solid var(--border);
  text-decoration: none; color: inherit;
}
.ev-row:first-child { border-top: 0.5px solid var(--border); }

.ev-thumb { width: 68px; flex-shrink: 0; background: var(--bg-sub); overflow: hidden; }
.ev-thumb img { width: 100%; height: 100%; object-fit: cover; }
.ev-thumb-ph {
  width: 68px; flex-shrink: 0; background: var(--bg-sub);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--text-9); color: var(--l4); letter-spacing: 0.06em;
  text-align: center; line-height: 1.4;
}

.ev-body {
  flex: 1;
  padding: var(--sp-12) 0 var(--sp-12) var(--sp-16);
  display: flex; flex-direction: column;
  justify-content: center; gap: 4px;
}
.ev-date { display: flex; align-items: baseline; gap: 6px; }
.ev-num {
  font-size: var(--text-24); font-weight: var(--fw-medium);

}
.ev-dow { font-size: var(--text-11); font-weight: var(--fw-light); color: var(--l3); }
.ev-mon { font-size: var(--text-11); font-weight: var(--fw-light); color: var(--l4); }
.ev-title {

}
.ev-cast {
  font-size: var(--text-13); font-weight: var(--fw-light);
  color: var(--l3); line-height: var(--lh-list);
}
.ev-foot {
  display: flex; gap: 6px; align-items: center;
  font-size: var(--text-11); font-weight: var(--fw-light); color: var(--l4);
}

.list-foot {
  padding: var(--sp-16) var(--page-pad) var(--sec-gap);
  display: flex; flex-direction: column; gap: var(--sp-8);
}
.more-btn {
  display: block; width: 100%; padding: 12px; text-align: center;
  border: 0.5px solid var(--border-mid); border-radius: var(--radius);
  background: transparent; color: var(--l3);

  letter-spacing: 0.1em; font-family: var(--font); cursor: pointer;

.sync {

}
.sync-dot {

}

/* NEWS */
.news { padding: 0 var(--page-pad) var(--sec-gap); }
.news-item {
  display: flex; gap: var(--sp-16);
  padding: var(--sp-12) 0;

}
.news-item:first-child { border-top: 0.5px solid var(--border); }
.news-date {

  color: var(--l4); min-width: 44px; padding-top: 3px;

.news-cat {
  font-size: var(--text-9); color: var(--accent);
  letter-spacing: 0.12em; margin-bottom: 4px; opacity: 0.85;

}
.news-title {
  font-size: var(--text-15); font-weight: var(--fw-regular);
  color: var(--l2); line-height: var(--lh-heading);
}
</style>

<script>
var EVENTS_URL = 'https://raw.githubusercontent.com/school-livebar-tokyo/schoolivebar.com/main/events.json';
var SHOW_COUNT = 5;
var ALL_EVENTS = [];
var DAYS_EN = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
var MONTHS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function parseDate(str) {
  if (!str) return null;
  var m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]);
}

function getDowClass(d) {
  var day = d.getDay();
  if (day === 6) return 'sat';
  if (day === 0) return 'sun';
  return '';
}

function sanitize(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderToday(events) {
  var today = new Date(); today.setHours(0,0,0,0);
  var ev = null;
  for (var i=0; i<events.length; i++) {
    var d = parseDate(events[i].date);
    if (!d) continue;
    d.setHours(0,0,0,0);
    if (d.getTime() === today.getTime()) { ev = events[i]; break; }
  }
  if (!ev) {
    document.getElementById('heroArtists').innerHTML =
      '<span style="font-size:var(--text-15);color:var(--l3);font-weight:var(--fw-light)">本日の営業はありません</span>';
    document.getElementById('heroMeta').style.display = 'none';
    document.getElementById('heroLink').style.display = 'none';
    return;
  }
  var d = parseDate(ev.date);
  if (ev.flyer_url) { document.getElementById('heroBgImg').src = ev.flyer_url; }
  document.getElementById('heroDate').textContent =
    (d.getMonth()+1) + '.' + d.getDate() + '  ' + DAYS_EN[d.getDay()];
  document.getElementById('heroTitle').textContent = ev.title || '';
  var artists = (ev.artists || '').split('//').map(function(a){ return sanitize(a.trim()); });
  document.getElementById('heroArtists').innerHTML = artists.join('<br>');
  var meta = '';
  if (ev.open_start) meta += '<div class="hero-meta-item"><div class="hero-meta-label">Open / Start</div><div class="hero-meta-val">'+sanitize(ev.open_start)+'</div></div>';
  if (ev.ticket_price) meta += '<div class="hero-meta-item"><div class="hero-meta-label">Adv / Door</div><div class="hero-meta-val">'+sanitize(ev.ticket_price)+'</div></div>';
  document.getElementById('heroMeta').innerHTML = meta;
  document.getElementById('heroLink').href = 'event.html?id=' + sanitize(ev.id || '');
}

function renderPickup(events) {
  var today = new Date(); today.setHours(0,0,0,0);
  var pickups = events.filter(function(e) {
    var d = parseDate(e.date); if (!d) return false;
    d.setHours(0,0,0,0);
    return e.pickup && d >= today;
  });
  var container = document.getElementById('pickupList');
  if (!pickups.length) { container.closest('section').style.display='none'; return; }
  var html = '';
  pickups.forEach(function(e) {
    var d = parseDate(e.date);
    var dowClass = getDowClass(d);
    var dateStr = (d.getMonth()+1)+'.'+('0'+d.getDate()).slice(-2)+' <span class="'+dowClass+'">'+DAYS_EN[d.getDay()]+'</span>';
    var artists = (e.artists||'').split('//').map(function(a){ return sanitize(a.trim()); }).join(' / ');
    var img = e.flyer_url
      ? '<img src="'+sanitize(e.flyer_url)+'" alt="'+sanitize(e.title)+'" loading="lazy">'
      : '<div class="pickup-flyer-ph">PHOTO</div>';
    html += '<a class="pickup-card" href="event.html?id='+sanitize(e.id||'')+'" role="listitem">'+
      '<div class="pickup-flyer">'+img+'</div>'+
      '<div class="pickup-info">'+
        '<div class="pickup-date">'+dateStr+'</div>'+
        '<div class="pickup-artists">'+artists+'</div>'+
        (e.title ? '<div class="pickup-sub">'+sanitize(e.title)+'</div>' : '')+
      '</div></a>';
  });
  container.innerHTML = html;
}

function renderSchedule() {
  var today = new Date(); today.setHours(0,0,0,0);
  var future = ALL_EVENTS.filter(function(e) {
    var d = parseDate(e.date); if (!d) return false;
    d.setHours(0,0,0,0); return d >= today;
  });
  var shown = future.slice(0, SHOW_COUNT);
  var html = '';
  shown.forEach(function(e) {
    var d = parseDate(e.date);
    var dowClass = getDowClass(d);
    var artists = (e.artists||'').split('//').map(function(a){ return sanitize(a.trim()); }).join(' / ');
    var thumb = e.flyer_url
      ? '<div class="ev-thumb"><img src="'+sanitize(e.flyer_url)+'" alt="" loading="lazy"></div>'
      : '<div class="ev-thumb-ph">NO<br>IMG</div>';
    html += '<a class="ev-row" href="event.html?id='+sanitize(e.id||'')+'" role="listitem">'+
      thumb+
      '<div class="ev-body">'+
        '<div class="ev-date">'+
          '<div class="ev-num">'+('0'+d.getDate()).slice(-2)+'</div>'+
          '<div class="ev-dow '+dowClass+'">'+DAYS_EN[d.getDay()]+'</div>'+
          '<div class="ev-mon">'+MONTHS_EN[d.getMonth()]+'</div>'+
        '</div>'+
        '<div class="ev-title">'+sanitize(e.title)+'</div>'+
        (artists ? '<div class="ev-cast">'+artists+'</div>' : '')+
        '<div class="ev-foot">'+
          (e.open_start ? '<span>'+sanitize(e.open_start)+'</span>' : '')+
          '<span class="tag">LIVE</span>'+
        '</div>'+
      '</div></a>';
  });
  document.getElementById('scheduleList').innerHTML = html;
  var btn = document.getElementById('moreBtn');
  if (future.length > SHOW_COUNT) {
    btn.style.display = 'block';
    btn.textContent = 'もっと見る (' + (future.length - SHOW_COUNT) + ')';
  } else {
    btn.style.display = 'none';
  }
}

function showMore() { SHOW_COUNT += 5; renderSchedule(); }

fetch(EVENTS_URL)
  .then(function(r){ return r.json(); })
  .then(function(data){
    ALL_EVENTS = data;
    renderToday(data);
    renderPickup(data);
    renderSchedule();
  })
  .catch(function(){
    document.getElementById('heroArtists').innerHTML =
      '<span style="font-size:var(--text-13);color:var(--l4)">読み込み中...</span>';
  });
</script>
</body>
</html>
