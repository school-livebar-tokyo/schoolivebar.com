/* ----------------------------------------
   TODAY'S SCHOOL
   ---------------------------------------- */

/* Open/Start + Door：一行 */

/* ----------------------------------------

   ---------------------------------------- */
.pickup-scroll {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;

.pickup-scroll::-webkit-scrollbar { display: none; }

<script>
/* ----------------------------------------
   ハンバーガーメニュー
   ---------------------------------------- */
var menuOverlay = document.getElementById('menuOverlay');
document.getElementById('menuOpen').addEventListener('click', function() {
  menuOverlay.classList.add('open');
  document.body.style.overflow = 'hidden';
});
document.getElementById('menuClose').addEventListener('click', closeMenu);
menuOverlay.addEventListener('click', function(e) {
  if (e.target === menuOverlay) closeMenu();
});
function closeMenu() {
  menuOverlay.classList.remove('open');
  document.body.style.overflow = '';
}

/* ----------------------------------------
   イベントデータ
   ---------------------------------------- */
var EVENTS_URL = 'https://raw.githubusercontent.com/school-livebar-tokyo/schoolivebar.com/main/events.json';
var SHOW_COUNT = 5;
var ALL_EVENTS = [];
var DAYS_EN   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
var MONTHS_EN = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

function parseDate(str) {
  if (!str) return null;
  var m = str.match(/(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return null;
  return new Date(+m[1], +m[2]-1, +m[3]);
}

function getDowClass(d) {
  var day = d.getDay();
  if (day === 6) return 'sat';
  if (day === 0) return 'sun';
  return '';
}

function sanitize(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* アーティスト名を1人1行のHTMLに変換（// または / 区切り） */
function artistsToLines(str) {
  if (!str) return '';
  var sep = str.indexOf('//') !== -1 ? '//' : '/';
  return str.split(sep).map(function(a) {
    return sanitize(a.trim());
  }).filter(function(a) { return a; }).join('<br>');
}

/* ----------------------------------------
   TODAY'S SCHOOL
   ---------------------------------------- */
function renderToday(events) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var ev = null;
  for (var i = 0; i < events.length; i++) {
    var d = parseDate(events[i].date);
    if (!d) continue;
    d.setHours(0,0,0,0);
    if (d.getTime() === today.getTime()) { ev = events[i]; break; }
  }

  if (!ev) {
    document.getElementById('todayArtists').innerHTML =
      '<span style="font-size:var(--text-15);color:var(--l3);font-weight:300">本日の営業はありません</span>';
    return;
  }

  /* アーティスト名：l1・1人1行 */
  document.getElementById('todayArtists').innerHTML = artistsToLines(ev.artists);

  /* タイトル：l2 */
  document.getElementById('todayTitle').textContent = ev.title || '';

  /* Open/Start + Door：一行 */
  var meta = '';
  var openStart = ev.open_start || ev.time || '';
  var ticketPrice = ev.ticket_price || ev.price || '';
  if (openStart) {
    meta += '<span class="today-meta-label">Open / Start</span>'
          + '<span class="today-meta-val">' + sanitize(openStart) + '</span>';
  }
  if (ticketPrice) {
    if (openStart) meta += '<span class="today-meta-sep">·</span>';
    meta += '<span class="today-meta-label">Door</span>'
          + '<span class="today-meta-val">' + sanitize(ticketPrice) + '</span>';
  }
  if (meta) {
    var el = document.getElementById('todayMeta');
    el.innerHTML = meta;
    el.style.display = 'flex';
  }
}

/* ----------------------------------------
   PICK UP（日付→タイトル→アーティスト名）
   ---------------------------------------- */
function renderPickup(events) {
  var today = new Date();
  today.setHours(0,0,0,0);
  var pickups = events.filter(function(e) {
    var d = parseDate(e.date);
    if (!d) return false;
    d.setHours(0,0,0,0);
    return e.pickup && d >= today;
  });

  if (!pickups.length) {
    document.getElementById('pickupSection').style.display = 'none';
    return;
  }

  var html = '';
  pickups.forEach(function(e) {
    var d = parseDate(e.date);
    var dowClass = getDowClass(d);
    var dateStr = (d.getMonth()+1) + '.' + ('0'+d.getDate()).slice(-2)
      + ' <span class="' + dowClass + '">' + DAYS_EN[d.getDay()] + '</span>';
    var flyerUrl = e.flyer_url || (e.images && e.images[0]) || '';
    var img = flyerUrl
      ? '<img src="' + sanitize(flyerUrl) + '" alt="' + sanitize(e.title) + '" loading="lazy">'
      : '<div class="pickup-flyer-ph">—</div>';

    html += '<a class="pickup-card" href="event.html?id=' + sanitize(e.id||'') + '">'
      + '<div class="pickup-flyer">' + img + '</div>'
      + '<div class="pickup-info">'
        + '<div class="pickup-date">' + dateStr + '</div>'
        + (e.title ? '<div class="pickup-title">' + sanitize(e.title) + '</div>' : '')
        + (e.artists ? '<div class="pickup-artists">' + artistsToLines(e.artists) + '</div>' : '')
      + '</div>'
      + '</a>';
  });
  document.getElementById('pickupList').innerHTML = html;
}

/* ----------------------------------------
   SCHEDULE（日付→アーティスト名→タイトル→時間）
   ---------------------------------------- */
function renderSchedule() {
  var today = new Date();
  today.setHours(0,0,0,0);
  var future = ALL_EVENTS.filter(function(e) {
    var d = parseDate(e.date);
    if (!d) return false;
    d.setHours(0,0,0,0);
    return d >= today;
  });

  var shown = future.slice(0, SHOW_COUNT);
  var html = '';
  shown.forEach(function(e) {
    var d = parseDate(e.date);
    var dowClass = getDowClass(d);
    var thumbUrl = e.flyer_url || (e.images && e.images[0]) || '';
    var thumb = thumbUrl
      ? '<div class="ev-thumb"><img src="' + sanitize(thumbUrl) + '" alt="" loading="lazy"></div>'
      : '<div class="ev-thumb-ph">—</div>';

    html += '<a class="ev-row" href="event.html?id=' + sanitize(e.id||'') + '">'
      + thumb
      + '<div class="ev-body">'
        + '<div class="ev-date">'
          + '<div class="ev-num">' + ('0'+d.getDate()).slice(-2) + '</div>'
          + '<div class="ev-dow ' + dowClass + '">' + DAYS_EN[d.getDay()] + '</div>'
          + '<div class="ev-mon">' + MONTHS_EN[d.getMonth()] + '</div>'
        + '</div>'
        + (e.artists ? '<div class="ev-cast">' + artistsToLines(e.artists) + '</div>' : '')
        + (e.title ? '<div class="ev-title">' + sanitize(e.title) + '</div>' : '')
        + ((e.open_start || e.time) ? '<div class="ev-time">' + sanitize(e.open_start || e.time) + '</div>' : '')
      + '</div>'
      + '</a>';
  });

  document.getElementById('scheduleList').innerHTML = html;

  var btn = document.getElementById('moreBtn');
  if (future.length > SHOW_COUNT) {
    btn.style.display = 'block';
    btn.textContent = 'もっと見る (' + (future.length - SHOW_COUNT) + ')';
  } else {
    btn.style.display = 'none';
  }
}

function showMore() { SHOW_COUNT += 5; renderSchedule(); }

fetch(EVENTS_URL)
  .then(function(r) { return r.json(); })
  .then(function(data) {
    ALL_EVENTS = data;
    renderToday(data);
    renderPickup(data);
    renderSchedule();
  })
  .catch(function() {
    document.getElementById('todayArtists').innerHTML =
      '<span style="font-size:var(--text-13);color:var(--l4)">読み込み中...</span>';
  });
</script>
</body>
</html>
